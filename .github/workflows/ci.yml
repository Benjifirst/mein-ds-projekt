name: CI – Python / Data Science

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────
  # 1. Code Quality
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff black isort

      - name: Run Ruff (linter)
        run: ruff check . --output-format=github

      - name: Check Black formatting
        run: black --check --diff .

      - name: Check import order (isort)
        run: isort --check-only --diff .

  # ──────────────────────────────────────────────
  # 2. Tests + Coverage
  # ──────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -n auto \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────
  # 3. Data & Schema Validation
  # ──────────────────────────────────────────────
  data-validation:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install great_expectations pandera

      - name: Validate data schemas (pandera)
        run: python scripts/validate_schemas.py

      - name: Run Great Expectations checkpoints
        run: |
          great_expectations checkpoint run data_quality_checkpoint
        continue-on-error: false

  # ──────────────────────────────────────────────
  # 4. Model Training & Evaluation (Smoke Test)
  # ──────────────────────────────────────────────
  model-smoke-test:
    name: Model Smoke Test
    runs-on: ubuntu-latest
    needs: [test, data-validation]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model smoke test (small dataset)
        run: python scripts/smoke_test_model.py --max-rows 1000

      - name: Check model metrics threshold
        run: python scripts/check_metrics.py --min-accuracy 0.75

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-smoke-artifacts
          path: outputs/smoke/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 5. Security Scan
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Bandit & Safety
        run: pip install bandit safety

      - name: Run Bandit (static security analysis)
        run: bandit -r src/ -ll

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt

  # ──────────────────────────────────────────────
  # 6. Build Docker Image (dry-run)
  # ──────────────────────────────────────────────
  build:
    name: Docker Build (dry-run)
    runs-on: ubuntu-latest
    needs: [test, model-smoke-test, security]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: myapp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
